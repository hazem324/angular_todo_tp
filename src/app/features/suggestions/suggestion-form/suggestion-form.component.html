<div class="form-wrapper">

  <div class="card">

    <div class="card-header">
      <span class="eyebrow">Nouvelle entrée</span>
      <h1>Soumettre une suggestion</h1>
    </div>

    <form [formGroup]="suggestionForm" (ngSubmit)="onSubmit()" class="form-grid" novalidate>

      <!-- TITRE -->
      <div class="field">
        <label for="title">Titre</label>
        <input
          id="title"
          type="text"
          formControlName="title"
          placeholder="Ex: Amélioration du tableau de bord"
          [class.is-invalid]="suggestionForm.get('title')?.invalid && suggestionForm.get('title')?.touched"
        >
        <div
          class="field-errors"
          *ngIf="suggestionForm.get('title')?.invalid && suggestionForm.get('title')?.touched"
        >
          <small class="error-msg" *ngIf="suggestionForm.get('title')?.errors?.['required']">
            Le titre est obligatoire
          </small>
          <small class="error-msg" *ngIf="suggestionForm.get('title')?.errors?.['minlength']">
            Minimum 5 caractères
          </small>
          <small class="error-msg" *ngIf="suggestionForm.get('title')?.errors?.['pattern']">
            Doit commencer par une majuscule et contenir seulement des lettres
          </small>
        </div>
      </div>

      <!-- DESCRIPTION -->
      <div class="field">
        <label for="description">Description</label>
        <textarea
          id="description"
          formControlName="description"
          placeholder="Décrivez votre suggestion en détail…"
          [class.is-invalid]="suggestionForm.get('description')?.invalid && suggestionForm.get('description')?.touched"
        ></textarea>
        <div
          class="field-errors"
          *ngIf="suggestionForm.get('description')?.invalid && suggestionForm.get('description')?.touched"
        >
          <small class="error-msg" *ngIf="suggestionForm.get('description')?.errors?.['required']">
            Description obligatoire
          </small>
          <small class="error-msg" *ngIf="suggestionForm.get('description')?.errors?.['minlength']">
            Minimum 30 caractères
          </small>
        </div>
      </div>

      <!-- CATÉGORIE -->
      <div class="field">
        <label for="category">Catégorie</label>
        <div class="select-wrapper">
          <select
            id="category"
            formControlName="category"
            [class.is-invalid]="suggestionForm.get('category')?.invalid && suggestionForm.get('category')?.touched"
          >
            <option value="">— Choisir une catégorie —</option>
            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <!-- DATE + STATUS -->
      <div class="field-row">
        <div class="field">
          <label for="date">Date</label>
          <input
            id="date"
            type="text"
            formControlName="date"
            readonly
          >
        </div>
        <div class="field">
          <label for="status">Statut</label>
          <input
            id="status"
            type="text"
            formControlName="status"
            readonly
          >
        </div>
      </div>

      <!-- SUBMIT -->
      <button
        class="btn-submit"
        type="submit"
        [disabled]="suggestionForm.invalid"
      >
        Soumettre la suggestion
      </button>

    </form>

  </div>

</div>
